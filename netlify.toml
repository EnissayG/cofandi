# Build & deploy (Netlify détecte Vite automatiquement, ces valeurs sont des exemples)
[build]
  command = "npm run build"
  publish = "dist"

# SPA : toutes les URLs renvoient vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache long pour les assets hashed (JS/CSS) = moins de rechargement
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache pour les images du dossier public
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# index.html : pas de cache pour toujours avoir la dernière version
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
