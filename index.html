<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cofandi</title>
    <meta name="description" content="L'expérience café premium en libre-service sur le campus Concordia. Boissons de qualité, machines modernes, disponible 24/7." />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="32x32" href="/favicon-32x32.png" />
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cofandi — Café premium en libre-service" />
    <meta property="og:description" content="L'expérience café premium en libre-service sur le campus Concordia. Boissons de qualité, machines modernes, disponible 24/7." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:image:alt" content="Cofandi" />
    <meta property="og:locale" content="fr_CA" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cofandi — Café premium en libre-service" />
    <meta name="twitter:description" content="L'expérience café premium en libre-service sur le campus Concordia. Boissons de qualité, machines modernes, disponible 24/7." />
    <meta name="twitter:image" content="/logo.png" />
    <meta name="twitter:image:alt" content="Cofandi" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Formulaire caché pour que Netlify enregistre le formulaire "contact" au déploiement -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" netlify hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="organization" />
      <input type="text" name="reason" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
